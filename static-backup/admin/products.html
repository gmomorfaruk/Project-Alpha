<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#178582">
    <title>Product Management - Admin - Project Alpha</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <script src="../js/admin-sidebar.js"></script>
    <script>document.write(generateAdminLayout('products'));</script>

    <!-- Main Content -->
    <main class="admin-main-content">
        <div class="content">
            <div class="page-header">
                <h1>Product Management</h1>
                <p>Manage your investment products</p>
            </div>

            <!-- Stats -->
            <div class="stats-row">
                <div class="stat-card-admin">
                    <div class="icon" style="background: rgba(59, 130, 246, 0.1); color: #3b82f6;">
                        <i class="fas fa-box"></i>
                    </div>
                    <div class="info">
                        <h3 id="totalProducts">0</h3>
                        <p>Total Products</p>
                    </div>
                </div>
                <div class="stat-card-admin">
                    <div class="icon" style="background: rgba(16, 185, 129, 0.1); color: #10b981;">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="info">
                        <h3 id="activeProducts">0</h3>
                        <p>Active Products</p>
                    </div>
                </div>
                <div class="stat-card-admin">
                    <div class="icon" style="background: rgba(245, 158, 11, 0.1); color: #f59e0b;">
                        <i class="fas fa-cubes"></i>
                    </div>
                    <div class="info">
                        <h3 id="totalStock">0</h3>
                        <p>Total Stock</p>
                    </div>
                </div>
                <div class="stat-card-admin">
                    <div class="icon" style="background: rgba(139, 92, 246, 0.1); color: #8b5cf6;">
                        <i class="fas fa-tags"></i>
                    </div>
                    <div class="info">
                        <h3 id="categories">0</h3>
                        <p>Categories</p>
                    </div>
                </div>
            </div>

            <!-- Products Table -->
            <div class="section" style="background: var(--bg-primary); border-radius: 16px; padding: 25px; border: 1px solid var(--border-color);">
                <div class="table-toolbar">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search products..." oninput="searchProducts()">
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <select id="filterCategory" onchange="filterProducts()">
                            <option value="all">All Categories</option>
                            <option value="electronics">Electronics</option>
                            <option value="fashion">Fashion</option>
                            <option value="home">Home & Living</option>
                            <option value="health">Health & Beauty</option>
                        </select>
                        <button class="btn btn-primary" onclick="openProductModal()">
                            <i class="fas fa-plus"></i> Add Product
                        </button>
                    </div>
                </div>

                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Return</th>
                                <th>Duration</th>
                                <th>Stock</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="productsTable">
                            <tr>
                                <td colspan="8" style="text-align: center; padding: 40px;">
                                    <i class="fas fa-box" style="font-size: 40px; color: var(--text-muted); margin-bottom: 10px;"></i>
                                    <p style="color: var(--text-muted);">No products found</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Product Modal -->
    <div class="form-modal" id="productModal">
        <div class="form-modal-content">
            <div class="form-modal-header">
                <h3 id="modalTitle">Add New Product</h3>
                <button class="form-modal-close" onclick="closeModal('productModal')"><i class="fas fa-times"></i></button>
            </div>
            <div class="form-modal-body">
                <form id="productForm">
                    <input type="hidden" id="productId">
                    
                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text" id="productName" placeholder="Enter product name" required>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label>Category</label>
                            <select id="productCategory" required>
                                <option value="electronics">Electronics</option>
                                <option value="fashion">Fashion</option>
                                <option value="home">Home & Living</option>
                                <option value="health">Health & Beauty</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Price (৳)</label>
                            <input type="number" id="productPrice" placeholder="0" min="100" required>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label>Return (%)</label>
                            <input type="number" id="productReturn" placeholder="10" min="1" max="100" required>
                        </div>
                        <div class="form-group">
                            <label>Duration (days)</label>
                            <input type="number" id="productDuration" placeholder="30" min="1" required>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label>Stock</label>
                            <input type="number" id="productStock" placeholder="100" min="0" required>
                        </div>
                        <div class="form-group">
                            <label>Min Units</label>
                            <input type="number" id="productMinUnits" placeholder="1" min="1" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="productDescription" rows="3" placeholder="Product description"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Image URL (optional)</label>
                        <input type="url" id="productImage" placeholder="https://example.com/image.jpg">
                    </div>

                    <div class="form-group">
                        <label class="toggle-switch">
                            <input type="checkbox" id="productActive" checked>
                            <span class="slider"></span>
                        </label>
                        <span style="margin-left: 10px;">Active</span>
                    </div>
                </form>
            </div>
            <div class="form-modal-footer">
                <button class="btn btn-outline" onclick="closeModal('productModal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveProduct()">Save Product</button>
            </div>
        </div>
    </div>

    <script src="../js/theme.js"></script>
    <script src="../js/admin-common.js"></script>
    <script src="../js/language.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/dashboard.js"></script>
    <script>
        let products = [];

        const defaultProducts = [
            {
                id: '1',
                name: 'Smart Watch Pro',
                category: 'electronics',
                price: 5000,
                returnRate: 15,
                duration: 30,
                stock: 50,
                minUnits: 1,
                description: 'Premium smart watch with health monitoring features.',
                image: '',
                active: true,
                createdAt: new Date().toISOString()
            },
            {
                id: '2',
                name: 'Wireless Earbuds Elite',
                category: 'electronics',
                price: 3000,
                returnRate: 12,
                duration: 21,
                stock: 100,
                minUnits: 1,
                description: 'High-quality wireless earbuds with noise cancellation.',
                image: '',
                active: true,
                createdAt: new Date().toISOString()
            },
            {
                id: '3',
                name: 'Solar Power Bank 20000mAh',
                category: 'electronics',
                price: 2500,
                returnRate: 10,
                duration: 14,
                stock: 75,
                minUnits: 2,
                description: 'Eco-friendly solar powered portable charger.',
                image: '',
                active: true,
                createdAt: new Date().toISOString()
            },
            {
                id: '4',
                name: 'Premium Leather Wallet',
                category: 'fashion',
                price: 1500,
                returnRate: 8,
                duration: 7,
                stock: 200,
                minUnits: 5,
                description: 'Genuine leather wallet with RFID protection.',
                image: '',
                active: true,
                createdAt: new Date().toISOString()
            },
            {
                id: '5',
                name: 'Aromatherapy Diffuser',
                category: 'home',
                price: 2000,
                returnRate: 11,
                duration: 21,
                stock: 60,
                minUnits: 2,
                description: 'Ultrasonic essential oil diffuser with LED lights.',
                image: '',
                active: true,
                createdAt: new Date().toISOString()
            }
        ];

        document.addEventListener('DOMContentLoaded', function() {
            const user = Storage.get('currentUser');
            if (!user || !user.isLoggedIn || user.role !== 'admin') {
                window.location.href = '../login.html';
                return;
            }

            document.getElementById('userName').textContent = user.name || 'Admin';
            
            // Initialize products if not exists
            if (!Storage.get('products')) {
                Storage.set('products', defaultProducts);
            }
            
            loadProducts();
        });

        function loadProducts() {
            products = Storage.get('products') || defaultProducts;
            updateStats();
            renderProducts(products);
        }

        function updateStats() {
            document.getElementById('totalProducts').textContent = products.length;
            document.getElementById('activeProducts').textContent = products.filter(p => p.active).length;
            document.getElementById('totalStock').textContent = products.reduce((sum, p) => sum + p.stock, 0);
            
            const categories = [...new Set(products.map(p => p.category))];
            document.getElementById('categories').textContent = categories.length;
        }

        function renderProducts(productList) {
            const tbody = document.getElementById('productsTable');
            
            if (productList.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" style="text-align: center; padding: 40px;">
                            <i class="fas fa-box" style="font-size: 40px; color: var(--text-muted); margin-bottom: 10px;"></i>
                            <p style="color: var(--text-muted);">No products found</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = productList.map(product => `
                <tr>
                    <td>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <div class="product-img-table">
                                ${product.image ? `<img src="${product.image}" alt="${product.name}">` : `<i class="fas fa-box"></i>`}
                            </div>
                            <span>${product.name}</span>
                        </div>
                    </td>
                    <td><span class="badge badge-secondary">${product.category}</span></td>
                    <td><strong>${formatCurrency(product.price)}</strong></td>
                    <td><span style="color: #10b981;">${product.returnRate}%</span></td>
                    <td>${product.duration} days</td>
                    <td>${product.stock}</td>
                    <td><span class="badge badge-${product.active ? 'success' : 'secondary'}">${product.active ? 'Active' : 'Inactive'}</span></td>
                    <td>
                        <div class="actions">
                            <button class="action-btn-edit" onclick="editProduct('${product.id}')" title="Edit"><i class="fas fa-edit"></i></button>
                            <button class="action-btn-delete" onclick="deleteProduct('${product.id}')" title="Delete"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function searchProducts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(query));
            renderProducts(filtered);
        }

        function filterProducts() {
            const category = document.getElementById('filterCategory').value;
            let filtered = products;
            
            if (category !== 'all') {
                filtered = products.filter(p => p.category === category);
            }
            
            renderProducts(filtered);
        }

        function openProductModal(id = null) {
            document.getElementById('modalTitle').textContent = id ? 'Edit Product' : 'Add New Product';
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            document.getElementById('productActive').checked = true;

            if (id) {
                const product = products.find(p => p.id === id);
                if (product) {
                    document.getElementById('productId').value = product.id;
                    document.getElementById('productName').value = product.name;
                    document.getElementById('productCategory').value = product.category;
                    document.getElementById('productPrice').value = product.price;
                    document.getElementById('productReturn').value = product.returnRate;
                    document.getElementById('productDuration').value = product.duration;
                    document.getElementById('productStock').value = product.stock;
                    document.getElementById('productMinUnits').value = product.minUnits;
                    document.getElementById('productDescription').value = product.description || '';
                    document.getElementById('productImage').value = product.image || '';
                    document.getElementById('productActive').checked = product.active;
                }
            }

            document.getElementById('productModal').classList.add('active');
        }

        function editProduct(id) {
            openProductModal(id);
        }

        function saveProduct() {
            const id = document.getElementById('productId').value;
            const name = document.getElementById('productName').value;
            const category = document.getElementById('productCategory').value;
            const price = parseFloat(document.getElementById('productPrice').value);
            const returnRate = parseFloat(document.getElementById('productReturn').value);
            const duration = parseInt(document.getElementById('productDuration').value);
            const stock = parseInt(document.getElementById('productStock').value);
            const minUnits = parseInt(document.getElementById('productMinUnits').value);
            const description = document.getElementById('productDescription').value;
            const image = document.getElementById('productImage').value;
            const active = document.getElementById('productActive').checked;

            if (!name || !price || !returnRate || !duration) {
                showToast('Please fill all required fields', 'error');
                return;
            }

            const product = {
                id: id || generateId(),
                name,
                category,
                price,
                returnRate,
                duration,
                stock,
                minUnits,
                description,
                image,
                active,
                createdAt: id ? products.find(p => p.id === id)?.createdAt : new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };

            if (id) {
                const index = products.findIndex(p => p.id === id);
                if (index !== -1) {
                    products[index] = product;
                }
            } else {
                products.push(product);
            }

            Storage.set('products', products);
            showToast(`Product ${id ? 'updated' : 'added'} successfully`, 'success');
            closeModal('productModal');
            loadProducts();
        }

        function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product?')) return;

            products = products.filter(p => p.id !== id);
            Storage.set('products', products);
            
            showToast('Product deleted successfully', 'success');
            loadProducts();
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function logout() {
            Storage.remove('currentUser');
            window.location.href = '../login.html';
        }
    </script>
</body>
</html>

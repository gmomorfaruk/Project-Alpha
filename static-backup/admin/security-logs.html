<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#178582">
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <title>Security Logs - Admin</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .security-logs-container {
            background: var(--bg-primary);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }
        .logs-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logs-filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }
        .filter-btn:hover, .filter-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        .log-entry {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: flex-start;
            gap: 15px;
            transition: background 0.2s;
        }
        .log-entry:hover {
            background: var(--bg-secondary);
        }
        .log-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .log-icon.login { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .log-icon.logout { background: rgba(99, 102, 241, 0.1); color: #6366f1; }
        .log-icon.failed { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .log-icon.security { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .log-icon.transaction { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .log-content {
            flex: 1;
        }
        .log-type {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .log-details {
            font-size: 13px;
            color: var(--text-secondary);
            word-break: break-all;
        }
        .log-meta {
            text-align: right;
            flex-shrink: 0;
        }
        .log-time {
            font-size: 12px;
            color: var(--text-muted);
        }
        .log-user-agent {
            font-size: 11px;
            color: var(--text-muted);
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }
        .stat-card h3 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        .stat-card p {
            color: var(--text-muted);
            font-size: 13px;
        }
        .empty-logs {
            padding: 60px 20px;
            text-align: center;
            color: var(--text-muted);
        }
        .empty-logs i {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <script src="../js/security.js"></script>
    <script src="../js/admin-sidebar.js"></script>
    <script>document.write(generateAdminLayout('security'));</script>

    <main class="admin-main-content">
        <div class="content">
            <div class="page-header">
                <h1><i class="fas fa-shield-alt" style="color: var(--primary-color); margin-right: 10px;"></i>Security Logs</h1>
                <p>Monitor security events and user activity</p>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3 id="totalEvents" style="color: var(--primary-color);">0</h3>
                    <p>Total Events (Last 24h)</p>
                </div>
                <div class="stat-card">
                    <h3 id="loginSuccess" style="color: #10b981;">0</h3>
                    <p>Successful Logins</p>
                </div>
                <div class="stat-card">
                    <h3 id="loginFailed" style="color: #ef4444;">0</h3>
                    <p>Failed Logins</p>
                </div>
                <div class="stat-card">
                    <h3 id="suspiciousEvents" style="color: #f59e0b;">0</h3>
                    <p>Suspicious Activities</p>
                </div>
            </div>

            <!-- Logs Container -->
            <div class="security-logs-container">
                <div class="logs-header">
                    <div class="logs-filters">
                        <button class="filter-btn active" data-filter="all" onclick="filterLogs('all')">All Events</button>
                        <button class="filter-btn" data-filter="login" onclick="filterLogs('login')">Logins</button>
                        <button class="filter-btn" data-filter="failed" onclick="filterLogs('failed')">Failed</button>
                        <button class="filter-btn" data-filter="transaction" onclick="filterLogs('transaction')">Transactions</button>
                        <button class="filter-btn" data-filter="session" onclick="filterLogs('session')">Sessions</button>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-outline btn-sm" onclick="refreshLogs()">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                        <button class="btn btn-outline btn-sm" style="color: #ef4444; border-color: #ef4444;" onclick="clearLogs()">
                            <i class="fas fa-trash"></i> Clear Logs
                        </button>
                    </div>
                </div>
                <div id="logsContainer">
                    <div class="empty-logs">
                        <i class="fas fa-shield-alt"></i>
                        <p>No security events recorded yet</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/theme.js"></script>
    <script src="../js/admin-common.js"></script>
    <script src="../js/language.js"></script>
    <script src="../js/main.js"></script>
    <script>
        let currentFilter = 'all';

        document.addEventListener('DOMContentLoaded', function() {
            // Authentication check
            const user = Storage.get('currentUser');
            if (!user || !user.isLoggedIn || user.role !== 'admin') {
                window.location.href = '../login.html';
                return;
            }
            
            loadSecurityLogs();
            updateStats();
        });

        function loadSecurityLogs() {
            const logs = JSON.parse(localStorage.getItem('projectAlpha_securityLogs') || '[]');
            renderLogs(logs);
        }

        function renderLogs(logs) {
            const container = document.getElementById('logsContainer');
            
            // Filter logs
            let filteredLogs = logs;
            if (currentFilter !== 'all') {
                filteredLogs = logs.filter(log => {
                    if (currentFilter === 'login') return log.type.includes('login') || log.type.includes('signup');
                    if (currentFilter === 'failed') return log.type.includes('failed') || log.type.includes('invalid');
                    if (currentFilter === 'transaction') return log.type.includes('deposit') || log.type.includes('withdraw');
                    if (currentFilter === 'session') return log.type.includes('session');
                    return true;
                });
            }

            if (filteredLogs.length === 0) {
                container.innerHTML = `
                    <div class="empty-logs">
                        <i class="fas fa-shield-alt"></i>
                        <p>No security events found</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredLogs.slice(0, 100).map(log => {
                const iconClass = getIconClass(log.type);
                const icon = getIcon(log.type);
                const time = new Date(log.timestamp).toLocaleString();
                const details = formatDetails(log.details);
                
                return `
                    <div class="log-entry">
                        <div class="log-icon ${iconClass}">
                            <i class="fas ${icon}"></i>
                        </div>
                        <div class="log-content">
                            <div class="log-type">${Security.sanitizeHTML(formatType(log.type))}</div>
                            <div class="log-details">${details}</div>
                        </div>
                        <div class="log-meta">
                            <div class="log-time">${time}</div>
                            <div class="log-user-agent" title="${Security.sanitizeHTML(log.userAgent || '')}">${Security.sanitizeHTML((log.userAgent || '').substring(0, 30))}...</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getIconClass(type) {
            if (type.includes('login_success') || type.includes('signup')) return 'login';
            if (type.includes('logout')) return 'logout';
            if (type.includes('failed') || type.includes('invalid') || type.includes('unauthorized')) return 'failed';
            if (type.includes('deposit') || type.includes('withdraw')) return 'transaction';
            return 'security';
        }

        function getIcon(type) {
            if (type.includes('login')) return 'fa-sign-in-alt';
            if (type.includes('logout')) return 'fa-sign-out-alt';
            if (type.includes('signup')) return 'fa-user-plus';
            if (type.includes('failed') || type.includes('invalid')) return 'fa-exclamation-triangle';
            if (type.includes('deposit')) return 'fa-arrow-down';
            if (type.includes('withdraw')) return 'fa-arrow-up';
            if (type.includes('session')) return 'fa-key';
            return 'fa-shield-alt';
        }

        function formatType(type) {
            return type.split('_').map(word => 
                word.charAt(0).toUpperCase() + word.slice(1)
            ).join(' ');
        }

        function formatDetails(details) {
            if (!details || Object.keys(details).length === 0) return '-';
            return Object.entries(details)
                .map(([key, value]) => `<strong>${key}:</strong> ${Security.sanitizeHTML(String(value))}`)
                .join(' | ');
        }

        function filterLogs(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });
            loadSecurityLogs();
        }

        function refreshLogs() {
            loadSecurityLogs();
            updateStats();
            showToast('Logs refreshed', 'success');
        }

        function clearLogs() {
            if (confirm('Are you sure you want to clear all security logs? This action cannot be undone.')) {
                localStorage.removeItem('projectAlpha_securityLogs');
                loadSecurityLogs();
                updateStats();
                showToast('Security logs cleared', 'success');
            }
        }

        function updateStats() {
            const logs = JSON.parse(localStorage.getItem('projectAlpha_securityLogs') || '[]');
            const last24h = logs.filter(log => {
                const logTime = new Date(log.timestamp).getTime();
                return Date.now() - logTime < 24 * 60 * 60 * 1000;
            });

            document.getElementById('totalEvents').textContent = last24h.length;
            document.getElementById('loginSuccess').textContent = last24h.filter(l => l.type === 'login_success').length;
            document.getElementById('loginFailed').textContent = last24h.filter(l => l.type.includes('failed') || l.type.includes('invalid')).length;
            document.getElementById('suspiciousEvents').textContent = last24h.filter(l => l.type.includes('suspicious') || l.type.includes('unauthorized')).length;
        }
    </script>
</body>
</html>

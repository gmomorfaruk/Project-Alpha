<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#178582">
    <title>Wallet - Project Alpha</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .wallet-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            padding-top: 100px;
        }
        .wallet-container {
            width: 100%;
            max-width: 500px;
        }
        .balance-card {
            background: linear-gradient(135deg, var(--primary-color), #0d5a58);
            color: white;
            padding: 35px;
            border-radius: 20px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(23, 133, 130, 0.3);
        }
        .balance-icon {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .balance-icon i {
            font-size: 2rem;
        }
        .balance-label {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        .balance-value {
            font-size: 3rem;
            font-weight: 700;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        .action-btn {
            flex: 1;
            padding: 25px 20px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
            font-weight: 700;
            font-size: 1.1rem;
        }
        .action-btn i {
            font-size: 2rem;
        }
        .action-btn.deposit {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
        }
        .action-btn.deposit:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(16, 185, 129, 0.4);
        }
        .action-btn.withdraw {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.3);
        }
        .action-btn.withdraw:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(239, 68, 68, 0.4);
        }
        .transactions-card {
            background: var(--bg-primary);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }
        .transactions-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .transactions-header h3 {
            margin: 0;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .filter-tabs {
            display: flex;
            gap: 8px;
        }
        .filter-tab {
            padding: 6px 14px;
            border: none;
            border-radius: 20px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-tab.active {
            background: var(--primary-color);
            color: white;
        }
        .transactions-body {
            max-height: 400px;
            overflow-y: auto;
        }
        .transaction-row {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
        }
        .transaction-row:last-child {
            border-bottom: none;
        }
        .transaction-row:hover {
            background: var(--bg-secondary);
        }
        .transaction-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .transaction-icon.deposit {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }
        .transaction-icon.withdrawal {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }
        .transaction-info {
            flex: 1;
            min-width: 0;
        }
        .transaction-type {
            font-weight: 600;
            margin-bottom: 3px;
        }
        .transaction-id {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .transaction-amount {
            font-weight: 700;
            font-size: 1rem;
        }
        .transaction-amount.positive {
            color: #10b981;
        }
        .transaction-amount.negative {
            color: #ef4444;
        }
        .transaction-status {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: capitalize;
        }
        .transaction-status.pending {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
        }
        .transaction-status.approved {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }
        .transaction-status.rejected {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }
        .empty-state {
            padding: 50px 20px;
            text-align: center;
            color: var(--text-muted);
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <!-- Top Navbar -->
    <nav class="top-navbar">
        <a href="index.html" class="navbar-brand">
            <i class="fas fa-rocket"></i>
            <span>Project Alpha</span>
        </a>

        <div class="navbar-menu">
            <div class="navbar-item">
                <a href="index.html" class="navbar-link">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
            </div>
            <div class="navbar-item">
                <button class="navbar-link">
                    <i class="fas fa-tasks"></i>
                    <span>Tasks</span>
                    <i class="fas fa-chevron-down dropdown-arrow"></i>
                </button>
                <div class="navbar-dropdown">
                    <a href="tasks.html" class="dropdown-item">
                        <i class="fas fa-list-check"></i>
                        <span>All Tasks</span>
                    </a>
                    <a href="youtube-tasks.html" class="dropdown-item">
                        <i class="fab fa-youtube" style="color: #ef4444;"></i>
                        <span>YouTube Tasks</span>
                    </a>
                    <a href="social-tasks.html" class="dropdown-item">
                        <i class="fas fa-share-alt" style="color: #3b82f6;"></i>
                        <span>Social Tasks</span>
                    </a>
                </div>
            </div>
            <div class="navbar-item">
                <button class="navbar-link">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                    <i class="fas fa-chevron-down dropdown-arrow"></i>
                </button>
                <div class="navbar-dropdown">
                    <a href="profile.html" class="dropdown-item">
                        <i class="fas fa-user-circle"></i>
                        <span>My Profile</span>
                    </a>
                    <a href="wallet.html" class="dropdown-item active">
                        <i class="fas fa-wallet" style="color: #10b981;"></i>
                        <span>Wallet</span>
                    </a>
                </div>
            </div>
        </div>

        <div class="navbar-right">
            <button class="navbar-icon-btn" id="themeToggle" title="Toggle Theme">
                <i class="fas fa-moon"></i>
            </button>
            <div class="navbar-user" onclick="window.location.href='profile.html'">
                <div class="navbar-user-avatar">
                    <i class="fas fa-user"></i>
                </div>
                <span class="navbar-user-name" id="userName">User</span>
            </div>
            <button class="navbar-icon-btn logout-btn" onclick="logout()" title="Logout" style="color: #ef4444;">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="wallet-page">
        <div class="wallet-container">
            <!-- Balance Card -->
            <div class="balance-card">
                <div class="balance-icon">
                    <i class="fas fa-wallet"></i>
                </div>
                <div class="balance-label">Available Balance</div>
                <div class="balance-value" id="walletBalance">৳0</div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <a href="deposit.html" class="action-btn deposit">
                    <i class="fas fa-plus-circle"></i>
                    <span>Deposit</span>
                </a>
                <a href="withdraw.html" class="action-btn withdraw">
                    <i class="fas fa-minus-circle"></i>
                    <span>Withdraw</span>
                </a>
            </div>

            <!-- Withdrawal Setup Section (Simplified: Bank Account & Password Only) -->
            <section id="withdraw-setup-section" class="transactions-card" style="margin-bottom: 24px;">
                <div class="transactions-header">
                    <h3><i class="fas fa-cog"></i> Bank Account Setup</h3>
                </div>
                <div class="transactions-body">
                    <form id="withdrawSetupForm">
                        <div class="form-group">
                            <label for="bankAccount">Bank Account Number</label>
                            <input type="text" id="bankAccount" required placeholder="Enter your bank account number">
                        </div>
                        <div class="form-group">
                            <label for="withdrawPassword">Set Withdrawal Password</label>
                            <input type="password" id="withdrawPassword" required placeholder="Set a password (min 6 chars)">
                        </div>
                        <button type="submit" class="btn btn-primary">Save Info</button>
                    </form>
                    <div id="withdrawSetupStatus"></div>
                </div>
            </section>

            <!-- Withdrawal Form Section (Simplified: Bank Account & Password Only) -->
            <section id="withdraw-section" class="transactions-card" style="margin-bottom: 24px;">
                <div class="transactions-header">
                    <h3><i class="fas fa-arrow-up"></i> Withdraw Funds</h3>
                </div>
                <div class="transactions-body">
                    <form id="withdrawForm">
                        <div class="form-group">
                            <label>Bank Account Number</label>
                            <input type="text" id="savedBankAccount" readonly>
                        </div>
                        <div class="form-group">
                            <label for="withdrawAmount">Amount</label>
                            <input type="number" id="withdrawAmount" min="100" required placeholder="Enter amount (min ৳100)">
                        </div>
                        <div class="form-group">
                            <label for="withdrawPasswordInput">Withdrawal Password</label>
                            <input type="password" id="withdrawPasswordInput" required placeholder="Enter withdrawal password">
                        </div>
                        <button type="submit" class="btn btn-primary">Submit Withdrawal</button>
                    </form>
                    <div id="withdrawStatus"></div>
                </div>
            </section>
            <!-- Transaction History -->
            <div class="transactions-card">
                <div class="transactions-header">
                    <h3><i class="fas fa-history"></i> Transaction History</h3>
                    <div class="filter-tabs">
                        <button class="filter-tab active" data-filter="all" onclick="filterTransactions('all')">All</button>
                        <button class="filter-tab" data-filter="deposit" onclick="filterTransactions('deposit')">Deposits</button>
                        <button class="filter-tab" data-filter="withdrawal" onclick="filterTransactions('withdrawal')">Withdrawals</button>
                    </div>
                </div>
                <div class="transactions-body" id="transactionsList">
                    <div class="empty-state">
                        <i class="fas fa-exchange-alt"></i>
                        <p>No transactions yet</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/app-config.js"></script>
    <script src="../js/database-manager.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const user = Storage.get('currentUser');
            if (!user || !user.isLoggedIn || user.role !== 'user') {
                window.location.href = '../login.html';
                return;
            }

            document.getElementById('userName').textContent = user.name || 'User';
            document.getElementById('walletBalance').textContent = formatCurrency(user.balance || 0);
            
            loadTransactions();

            // Withdrawal Setup Logic
            const withdrawSetupForm = document.getElementById('withdrawSetupForm');
            const withdrawForm = document.getElementById('withdrawForm');
            const withdrawSetupSection = document.getElementById('withdraw-setup-section');
            const withdrawSection = document.getElementById('withdraw-section');
            const withdrawSetupStatus = document.getElementById('withdrawSetupStatus');
            const withdrawStatus = document.getElementById('withdrawStatus');
            const savedWithdrawMethod = document.getElementById('savedWithdrawMethod');
            const savedWithdrawNumber = document.getElementById('savedWithdrawNumber');

            // Load saved bank account info
            let withdrawInfo = Storage.get('withdrawInfo_' + user.id);
            function updateWithdrawFormFields() {
                if (withdrawInfo) {
                    savedBankAccount.value = withdrawInfo.bankAccount;
                    withdrawSection.style.display = '';
                    withdrawSetupSection.style.display = 'none';
                } else {
                    withdrawSection.style.display = 'none';
                    withdrawSetupSection.style.display = '';
                }
            }
            updateWithdrawFormFields();

            // Setup form submit (bank account and password only)
            withdrawSetupForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const bankAccount = document.getElementById('bankAccount').value.trim();
                const password = document.getElementById('withdrawPassword').value;
                if (!bankAccount) {
                    withdrawSetupStatus.textContent = 'Please enter your bank account number.';
                    withdrawSetupStatus.style.color = 'red';
                    return;
                }
                if (password.length < 6) {
                    withdrawSetupStatus.textContent = 'Password must be at least 6 characters.';
                    withdrawSetupStatus.style.color = 'red';
                    return;
                }
                withdrawInfo = { bankAccount, password };
                Storage.set('withdrawInfo_' + user.id, withdrawInfo);
                withdrawSetupStatus.textContent = 'Bank account info saved!';
                withdrawSetupStatus.style.color = 'green';
                updateWithdrawFormFields();
            });

            // Withdraw form submit (bank account and password only)
            withdrawForm.addEventListener('submit', function(e) {
                e.preventDefault();
                if (!withdrawInfo) {
                    withdrawStatus.textContent = 'Please set your bank account info first.';
                    withdrawStatus.style.color = 'red';
                    return;
                }
                const amount = Number(document.getElementById('withdrawAmount').value);
                const passwordInput = document.getElementById('withdrawPasswordInput').value;
                if (amount < 100) {
                    withdrawStatus.textContent = 'Minimum withdrawal is ৳100.';
                    withdrawStatus.style.color = 'red';
                    return;
                }
                if (passwordInput !== withdrawInfo.password) {
                    withdrawStatus.textContent = 'Incorrect withdrawal password.';
                    withdrawStatus.style.color = 'red';
                    return;
                }
                if (amount > (user.balance || 0)) {
                    withdrawStatus.textContent = 'Insufficient balance.';
                    withdrawStatus.style.color = 'red';
                    return;
                }
                // Save withdrawal transaction
                const transaction = {
                    id: generateId(),
                    type: 'withdrawal',
                    method: 'bank',
                    amount: amount,
                    toNumber: withdrawInfo.bankAccount,
                    status: 'pending',
                    userId: user.id,
                    userEmail: user.email,
                    userName: user.name,
                    createdAt: new Date().toISOString()
                };
                // Deduct balance
                user.balance = (user.balance || 0) - amount;
                Storage.set('currentUser', user);
                // Update users array
                const users = Storage.get('users') || [];
                const userIndex = users.findIndex(u => u.id === user.id);
                if (userIndex !== -1) {
                    users[userIndex].balance = user.balance;
                    Storage.set('users', users);
                }
                // Save transaction
                const transactions = Storage.get('transactions') || [];
                transactions.unshift(transaction);
                Storage.set('transactions', transactions);
                withdrawStatus.textContent = 'Withdrawal request submitted! Waiting for admin approval.';
                withdrawStatus.style.color = 'green';
                withdrawForm.reset();
                document.getElementById('walletBalance').textContent = formatCurrency(user.balance || 0);
                loadTransactions();
            });
        });

        function loadTransactions() {
            const transactions = Storage.get('transactions') || [];
            const user = Storage.get('currentUser');
            const userTransactions = transactions.filter(t => t.userEmail === user.email);
            renderTransactions(userTransactions);
        }

        function renderTransactions(transactions, filter = 'all') {
            const container = document.getElementById('transactionsList');
            
            let filtered = transactions;
            if (filter !== 'all') {
                filtered = transactions.filter(t => t.type === filter);
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exchange-alt"></i>
                        <p>No transactions found</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(t => `
                <div class="transaction-row">
                    <div class="transaction-icon ${t.type}">
                        <i class="fas fa-${t.type === 'deposit' ? 'arrow-down' : 'arrow-up'}"></i>
                    </div>
                    <div class="transaction-info">
                        <div class="transaction-type">${t.type === 'deposit' ? 'Deposit' : 'Withdrawal'} via ${t.method}</div>
                        <div class="transaction-id">${t.type === 'deposit' ? 'TxnID: ' + t.txnId : 'To: ' + t.toNumber}</div>
                    </div>
                    <div class="transaction-amount ${t.type === 'deposit' ? 'positive' : 'negative'}">
                        ${t.type === 'deposit' ? '+' : '-'}${formatCurrency(t.amount)}
                    </div>
                    <span class="transaction-status ${t.status}">${t.status}</span>
                </div>
            `).join('');
        }

        function filterTransactions(filter) {
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.filter === filter);
            });
            
            const transactions = Storage.get('transactions') || [];
            const user = Storage.get('currentUser');
            const userTransactions = transactions.filter(t => t.userEmail === user.email);
            renderTransactions(userTransactions, filter);
        }

        function logout() {
            Storage.remove('currentUser');
            window.location.href = '../login.html';
        }

        // Desktop dropdown handling
        document.querySelectorAll('.navbar-item').forEach(item => {
            const dropdown = item.querySelector('.navbar-dropdown');
            if (dropdown) {
                item.addEventListener('mouseenter', () => {
                    dropdown.style.display = 'block';
                    setTimeout(() => dropdown.style.opacity = '1', 10);
                });
                item.addEventListener('mouseleave', () => {
                    dropdown.style.opacity = '0';
                    setTimeout(() => dropdown.style.display = 'none', 200);
                });
            }
        });
    </script>
    
    <script src="../js/chat-widget.js"></script>
</body>
</html>

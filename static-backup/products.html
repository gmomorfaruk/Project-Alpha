<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#178582">
    <title>Products - Project Alpha</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .products-page {
            padding: 120px 0 60px;
            min-height: 100vh;
            background: var(--bg-secondary);
        }

        .products-header {
            margin-bottom: 40px;
        }

        .products-header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .products-controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 45px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
        }

        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .filter-dropdown {
            position: relative;
        }

        .filter-dropdown select {
            padding: 12px 40px 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            appearance: none;
        }

        .filter-dropdown i {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: var(--text-secondary);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .product-card {
            background: var(--bg-primary);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .product-card.out-of-stock {
            opacity: 0.7;
        }

        .product-image-container {
            height: 180px;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .product-image-container i {
            font-size: 60px;
            color: var(--primary-color);
        }

        .product-badges {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
        }

        .product-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-offer {
            background: var(--danger-color);
            color: white;
        }

        .badge-category {
            background: var(--bg-primary);
            color: var(--text-secondary);
        }

        .product-content {
            padding: 20px;
        }

        .product-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .product-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 16px;
            font-weight: 600;
        }

        .info-value.profit {
            color: var(--success-color);
        }

        .info-value.price {
            color: var(--primary-color);
        }

        .product-footer {
            display: flex;
            gap: 10px;
        }

        .stock-info {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 0;
            border-top: 1px solid var(--border-color);
            margin-top: 15px;
        }

        .stock-info i {
            color: var(--success-color);
        }

        .stock-info.low i {
            color: var(--warning-color);
        }

        .stock-info.out i {
            color: var(--danger-color);
        }

        .no-products {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
        }

        .no-products i {
            font-size: 60px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .products-controls {
                flex-direction: column;
            }

            .search-box {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Page Loader -->
    <div class="page-loader">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <span>Loading...</span>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <i class="fas fa-rocket"></i>
                <span>Project Alpha</span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="products.html" class="active">Products</a>
                <a href="about.html">About</a>
                <a href="login.html">Login</a>
                <a href="signup.html" class="btn btn-primary">Sign Up</a>
            </div>
            <div class="nav-controls">
                <button class="theme-toggle" id="themeToggle" title="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="lang-toggle" id="langToggle" title="Toggle Language">
                    <span>EN</span>
                </button>
                <button class="mobile-menu" id="mobileMenu">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Products Page -->
    <section class="products-page">
        <div class="container">
            <div class="products-header">
                <h1 data-en="All Products" data-bn="সব পণ্য">All Products</h1>
                <p data-en="Choose from our wide range of investment products" data-bn="আমাদের বিস্তৃত বিনিয়োগ পণ্য থেকে বেছে নিন">Choose from our wide range of investment products</p>
            </div>

            <div class="products-controls">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search products..." data-placeholder-en="Search products..." data-placeholder-bn="পণ্য খুঁজুন...">
                </div>
                <div class="filter-dropdown">
                    <select id="categoryFilter">
                        <option value="all" data-en="All Categories" data-bn="সব বিভাগ">All Categories</option>
                        <option value="electronics">Electronics</option>
                        <option value="mobile">Mobile</option>
                        <option value="computer">Computer</option>
                        <option value="accessories">Accessories</option>
                        <option value="home">Home Appliances</option>
                    </select>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div class="filter-dropdown">
                    <select id="sortBy">
                        <option value="default" data-en="Sort By" data-bn="সাজান">Sort By</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="profit-high">Profit: High to Low</option>
                        <option value="newest">Newest First</option>
                    </select>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>

            <div class="products-grid" id="productsGrid">
                <!-- Products will be loaded here dynamically -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="border-top: none; padding-top: 0;">
                <p>&copy; 2025 Project Alpha. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/app-config.js"></script>
    <script src="js/database-manager.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/language.js"></script>
    <script src="js/main.js"></script>
    <script src="js/data.js"></script>
    <script>
        // Sample products data (will be replaced with database later)
        const sampleProducts = [
            {
                id: 1,
                name: 'Smartphone Package',
                category: 'mobile',
                price: 5000,
                profitPercentage: 12,
                selfSellProfit: 15,
                duration: 30,
                stock: 50,
                image: 'fa-mobile-alt',
                isActive: true,
                hasOffer: true,
                offerText: '20% OFF'
            },
            {
                id: 2,
                name: 'Laptop Package',
                category: 'computer',
                price: 15000,
                profitPercentage: 18,
                selfSellProfit: 22,
                duration: 45,
                stock: 25,
                image: 'fa-laptop',
                isActive: true,
                hasOffer: true,
                offerText: 'Special'
            },
            {
                id: 3,
                name: 'Electronics Package',
                category: 'electronics',
                price: 10000,
                profitPercentage: 15,
                selfSellProfit: 18,
                duration: 30,
                stock: 40,
                image: 'fa-tv',
                isActive: true,
                hasOffer: false
            },
            {
                id: 4,
                name: 'Smart Watch Bundle',
                category: 'accessories',
                price: 3000,
                profitPercentage: 10,
                selfSellProfit: 13,
                duration: 20,
                stock: 100,
                image: 'fa-clock',
                isActive: true,
                hasOffer: false
            },
            {
                id: 5,
                name: 'Gaming Console Pack',
                category: 'electronics',
                price: 20000,
                profitPercentage: 20,
                selfSellProfit: 25,
                duration: 60,
                stock: 15,
                image: 'fa-gamepad',
                isActive: true,
                hasOffer: true,
                offerText: 'Hot Deal'
            },
            {
                id: 6,
                name: 'Tablet Package',
                category: 'mobile',
                price: 8000,
                profitPercentage: 14,
                selfSellProfit: 17,
                duration: 35,
                stock: 30,
                image: 'fa-tablet-alt',
                isActive: true,
                hasOffer: false
            },
            {
                id: 7,
                name: 'Home Appliances Set',
                category: 'home',
                price: 12000,
                profitPercentage: 16,
                selfSellProfit: 20,
                duration: 40,
                stock: 0,
                image: 'fa-blender',
                isActive: true,
                hasOffer: false
            },
            {
                id: 8,
                name: 'Audio Equipment',
                category: 'electronics',
                price: 6000,
                profitPercentage: 12,
                selfSellProfit: 15,
                duration: 25,
                stock: 45,
                image: 'fa-headphones',
                isActive: true,
                hasOffer: false
            }
        ];

        // Render products
        function renderProducts(products) {
            const grid = document.getElementById('productsGrid');
            
            if (products.length === 0) {
                grid.innerHTML = `
                    <div class="no-products">
                        <i class="fas fa-box-open"></i>
                        <h3 data-en="No products found" data-bn="কোন পণ্য পাওয়া যায়নি">No products found</h3>
                        <p data-en="Try adjusting your search or filter" data-bn="আপনার সার্চ বা ফিল্টার পরিবর্তন করুন">Try adjusting your search or filter</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = products.map(product => {
                const stockClass = product.stock === 0 ? 'out' : product.stock < 10 ? 'low' : '';
                const stockText = product.stock === 0 ? 'Out of Stock' : `${product.stock} in stock`;
                const stockIcon = product.stock === 0 ? 'fa-times-circle' : product.stock < 10 ? 'fa-exclamation-circle' : 'fa-check-circle';

                return `
                    <div class="product-card ${product.stock === 0 ? 'out-of-stock' : ''}">
                        <div class="product-image-container">
                            <i class="fas ${product.image}"></i>
                            <div class="product-badges">
                                ${product.hasOffer ? `<span class="product-badge badge-offer">${product.offerText}</span>` : '<span></span>'}
                                <span class="product-badge badge-category">${product.category}</span>
                            </div>
                        </div>
                        <div class="product-content">
                            <h3 class="product-title">${product.name}</h3>
                            <div class="product-info">
                                <div class="info-item">
                                    <span class="info-label" data-en="Price" data-bn="মূল্য">Price</span>
                                    <span class="info-value price">৳${product.price.toLocaleString()}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label" data-en="Auto-Sell Profit" data-bn="অটো-সেল লাভ">Auto-Sell Profit</span>
                                    <span class="info-value profit">+${product.profitPercentage}%</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label" data-en="Self-Sell Profit" data-bn="সেলফ-সেল লাভ">Self-Sell Profit</span>
                                    <span class="info-value profit">+${product.selfSellProfit}%</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label" data-en="Duration" data-bn="সময়কাল">Duration</span>
                                    <span class="info-value">${product.duration} days</span>
                                </div>
                            </div>
                            <div class="stock-info ${stockClass}">
                                <i class="fas ${stockIcon}"></i>
                                <span>${stockText}</span>
                            </div>
                            <div class="product-footer">
                                <a href="login.html" class="btn btn-primary btn-block" ${product.stock === 0 ? 'disabled' : ''} data-en="${product.stock === 0 ? 'Out of Stock' : 'Invest Now'}" data-bn="${product.stock === 0 ? 'স্টক শেষ' : 'এখনই বিনিয়োগ করুন'}">
                                    ${product.stock === 0 ? 'Out of Stock' : 'Invest Now'}
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // Update language
            if (window.LanguageManager) {
                window.LanguageManager.updateUI();
            }
        }

        // Filter and search products
        function filterProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const sortBy = document.getElementById('sortBy').value;

            let filtered = sampleProducts.filter(product => {
                const matchesSearch = product.name.toLowerCase().includes(searchTerm);
                const matchesCategory = category === 'all' || product.category === category;
                return matchesSearch && matchesCategory && product.isActive;
            });

            // Sort products
            switch (sortBy) {
                case 'price-low':
                    filtered.sort((a, b) => a.price - b.price);
                    break;
                case 'price-high':
                    filtered.sort((a, b) => b.price - a.price);
                    break;
                case 'profit-high':
                    filtered.sort((a, b) => b.profitPercentage - a.profitPercentage);
                    break;
                case 'newest':
                    filtered.sort((a, b) => b.id - a.id);
                    break;
            }

            renderProducts(filtered);
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', filterProducts);
        document.getElementById('categoryFilter').addEventListener('change', filterProducts);
        document.getElementById('sortBy').addEventListener('change', filterProducts);

        // Initial render
        renderProducts(sampleProducts.filter(p => p.isActive));
    </script>
    
    <!-- Chat Widget -->
    <script src="js/chat-widget.js"></script>
</body>
</html>

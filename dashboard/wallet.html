<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#178582">
    <title>Wallet - Project Alpha</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .wallet-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            padding-top: 100px;
        }
        .wallet-container {
            width: 100%;
            max-width: 500px;
        }
        .balance-card {
            background: linear-gradient(135deg, var(--primary-color), #0d5a58);
            color: white;
            padding: 35px;
            border-radius: 20px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(23, 133, 130, 0.3);
        }
        .balance-icon {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .balance-icon i {
            font-size: 2rem;
        }
        .balance-label {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        .balance-value {
            font-size: 3rem;
            font-weight: 700;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        .action-btn {
            flex: 1;
            padding: 25px 20px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
            font-weight: 700;
            font-size: 1.1rem;
        }
        .action-btn i {
            font-size: 2rem;
        }
        .action-btn.deposit {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
        }
        .action-btn.deposit:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(16, 185, 129, 0.4);
        }
        .action-btn.withdraw {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.3);
        }
        .action-btn.withdraw:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(239, 68, 68, 0.4);
        }
        .transactions-card {
            background: var(--bg-primary);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }
        .transactions-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .transactions-header h3 {
            margin: 0;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .filter-tabs {
            display: flex;
            gap: 8px;
        }
        .filter-tab {
            padding: 6px 14px;
            border: none;
            border-radius: 20px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-tab.active {
            background: var(--primary-color);
            color: white;
        }
        .transactions-body {
            max-height: 400px;
            overflow-y: auto;
        }
        .transaction-row {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
        }
        .transaction-row:last-child {
            border-bottom: none;
        }
        .transaction-row:hover {
            background: var(--bg-secondary);
        }
        .transaction-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .transaction-icon.deposit {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }
        .transaction-icon.withdrawal {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }
        .transaction-info {
            flex: 1;
            min-width: 0;
        }
        .transaction-type {
            font-weight: 600;
            margin-bottom: 3px;
        }
        .transaction-id {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .transaction-amount {
            font-weight: 700;
            font-size: 1rem;
        }
        .transaction-amount.positive {
            color: #10b981;
        }
        .transaction-amount.negative {
            color: #ef4444;
        }
        .transaction-status {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: capitalize;
        }
        .transaction-status.pending {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
        }
        .transaction-status.approved {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }
        .transaction-status.rejected {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }
        .empty-state {
            padding: 50px 20px;
            text-align: center;
            color: var(--text-muted);
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <!-- Top Navbar -->
    <nav class="top-navbar">
        <a href="index.html" class="navbar-brand">
            <i class="fas fa-rocket"></i>
            <span>Project Alpha</span>
        </a>

        <div class="navbar-menu">
            <div class="navbar-item">
                <a href="index.html" class="navbar-link">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
            </div>
            <div class="navbar-item">
                <button class="navbar-link">
                    <i class="fas fa-tasks"></i>
                    <span>Tasks</span>
                    <i class="fas fa-chevron-down dropdown-arrow"></i>
                </button>
                <div class="navbar-dropdown">
                    <a href="tasks.html" class="dropdown-item">
                        <i class="fas fa-list-check"></i>
                        <span>All Tasks</span>
                    </a>
                    <a href="youtube-tasks.html" class="dropdown-item">
                        <i class="fab fa-youtube" style="color: #ef4444;"></i>
                        <span>YouTube Tasks</span>
                    </a>
                    <a href="social-tasks.html" class="dropdown-item">
                        <i class="fas fa-share-alt" style="color: #3b82f6;"></i>
                        <span>Social Tasks</span>
                    </a>
                </div>
            </div>
            <div class="navbar-item">
                <button class="navbar-link">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                    <i class="fas fa-chevron-down dropdown-arrow"></i>
                </button>
                <div class="navbar-dropdown">
                    <a href="profile.html" class="dropdown-item">
                        <i class="fas fa-user-circle"></i>
                        <span>My Profile</span>
                    </a>
                    <a href="wallet.html" class="dropdown-item active">
                        <i class="fas fa-wallet" style="color: #10b981;"></i>
                        <span>Wallet</span>
                    </a>
                </div>
            </div>
        </div>

        <div class="navbar-right">
            <button class="navbar-icon-btn" id="themeToggle" title="Toggle Theme">
                <i class="fas fa-moon"></i>
            </button>
            <div class="navbar-user" onclick="window.location.href='profile.html'">
                <div class="navbar-user-avatar">
                    <i class="fas fa-user"></i>
                </div>
                <span class="navbar-user-name" id="userName">User</span>
            </div>
            <button class="navbar-icon-btn logout-btn" onclick="logout()" title="Logout" style="color: #ef4444;">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="wallet-page">
        <div class="wallet-container">
            <!-- Stats Grid -->
            <div class="profile-stats-grid">
                <div class="profile-stat-card balance">
                    <div class="stat-icon"><i class="fas fa-wallet"></i></div>
                    <div class="stat-content">
                        <span class="stat-value" id="totalBalance">৳0</span>
                        <span class="stat-label">Balance</span>
                    </div>
                </div>
                <div class="profile-stat-card points">
                    <div class="stat-icon"><i class="fas fa-coins"></i></div>
                    <div class="stat-content">
                        <span class="stat-value" id="totalPoints">0</span>
                        <span class="stat-label">Points</span>
                    </div>
                </div>
                <div class="profile-stat-card withdrawn">
                    <div class="stat-icon"><i class="fas fa-arrow-up"></i></div>
                    <div class="stat-content">
                        <span class="stat-value" id="totalWithdrawn">৳0</span>
                        <span class="stat-label">Withdrawn</span>
                    </div>
                </div>
                <div class="profile-stat-card pending">
                    <div class="stat-icon"><i class="fas fa-clock"></i></div>
                    <div class="stat-content">
                        <span class="stat-value" id="pendingWithdraw">৳0</span>
                        <span class="stat-label">Pending</span>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <a href="deposit.html" class="action-btn deposit">
                    <i class="fas fa-plus-circle"></i>
                    <span>Deposit</span>
                </a>
                <button class="action-btn withdraw" onclick="openWithdrawModal()">
                    <i class="fas fa-minus-circle"></i>
                    <span>Withdraw</span>
                </button>
            </div>

            <!-- Transaction History -->
            <div class="transactions-card">
                <div class="transactions-header">
                    <h3><i class="fas fa-history"></i> Transaction History</h3>
                    <div class="filter-tabs">
                        <button class="filter-tab active" data-filter="all" onclick="filterTransactions('all')">All</button>
                        <button class="filter-tab" data-filter="deposit" onclick="filterTransactions('deposit')">Deposits</button>
                        <button class="filter-tab" data-filter="withdrawal" onclick="filterTransactions('withdrawal')">Withdrawals</button>
                    </div>
                </div>
                <div class="transactions-body" id="transactionsList">
                    <div class="empty-state">
                        <i class="fas fa-exchange-alt"></i>
                        <p>No transactions yet</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Withdraw Modal -->
    <div class="form-modal" id="withdrawModal">
        <div class="form-modal-content" style="max-width: 450px;">
            <div class="form-modal-header" style="background: linear-gradient(135deg, #10b981, #059669);">
                <h3><i class="fas fa-money-bill-wave" style="margin-right: 10px;"></i>Withdraw Funds</h3>
                <button class="form-modal-close" onclick="closeModal('withdrawModal')" style="color: white;"><i class="fas fa-times"></i></button>
            </div>
            <div class="form-modal-body">
                <div class="balance-display">
                    <span>Available Balance</span>
                    <strong id="availableBalance">৳0</strong>
                </div>
                <form id="withdrawForm">
                    <div class="form-group">
                        <label>Amount (৳)</label>
                        <input type="number" id="withdrawAmount" placeholder="Enter amount" min="100" required>
                        <small style="color: var(--text-muted);">Minimum: ৳100</small>
                    </div>
                    <div class="form-group">
                        <label>Payment Method</label>
                        <select id="withdrawMethod" required>
                            <option value="">Select method</option>
                            <option value="bkash">bKash</option>
                            <option value="nagad">Nagad</option>
                        </select>
                    </div>
                    <div class="form-group" id="accountNumberGroup">
                        <label>Account Number</label>
                        <input type="tel" id="withdrawAccount" placeholder="01XXXXXXXXX" required>
                    </div>
                </form>
            </div>
            <div class="form-modal-footer">
                <button class="btn btn-outline" onclick="closeModal('withdrawModal')">Cancel</button>
                <button class="btn btn-success" onclick="submitWithdraw()"><i class="fas fa-paper-plane"></i> Submit</button>
            </div>
        </div>
    </div>

    <!-- Payment Methods Modal -->
    <div class="form-modal" id="paymentModal">
        <div class="form-modal-content" style="max-width: 550px;">
            <div class="form-modal-header" style="background: linear-gradient(135deg, #3b82f6, #1d4ed8);">
                <h3><i class="fas fa-credit-card" style="margin-right: 10px;"></i>Payment Methods</h3>
                <button class="form-modal-close" onclick="closeModal('paymentModal')" style="color: white;"><i class="fas fa-times"></i></button>
            </div>
            <div class="form-modal-body">
                <form id="paymentForm">
                    <div class="form-group">
                        <label>bKash Number</label>
                        <input type="tel" id="paymentBkash" placeholder="01XXXXXXXXX">
                    </div>
                    <div class="form-group">
                        <label>Nagad Number</label>
                        <input type="tel" id="paymentNagad" placeholder="01XXXXXXXXX">
                    </div>
                    <div class="form-group">
                        <label>Rocket Number</label>
                        <input type="tel" id="paymentRocket" placeholder="01XXXXXXXXX">
                    </div>
                </form>
            </div>
            <div class="form-modal-footer">
                <button class="btn btn-outline" onclick="closeModal('paymentModal')">Cancel</button>
                <button class="btn btn-primary" onclick="savePaymentMethods()"><i class="fas fa-save"></i> Save Methods</button>
            </div>
        </div>
    </div>

    <script src="../js/app-config.js"></script>
    <script src="../js/database-manager.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const user = Storage.get('currentUser');
            if (!user) { window.location.href = '../login.html'; return; }

            document.getElementById('userName').textContent = user.name || 'User';
            loadWalletData();
        });

        function loadWalletData() {
            const user = Storage.get('currentUser');
            const withdrawals = Storage.get('withdrawals') || [];
            const userWithdrawals = withdrawals.filter(w => w.userId === user.email);

            const totalWithdrawn = userWithdrawals.filter(w => w.status === 'completed').reduce((sum, w) => sum + w.amount, 0);
            const pendingWithdraw = userWithdrawals.filter(w => w.status === 'pending').reduce((sum, w) => sum + w.amount, 0);

            document.getElementById('totalBalance').textContent = '৳' + (user.balance || 0).toLocaleString();
            document.getElementById('totalPoints').textContent = (user.points || 0).toLocaleString();
            document.getElementById('totalWithdrawn').textContent = '৳' + totalWithdrawn.toLocaleString();
            document.getElementById('pendingWithdraw').textContent = '৳' + pendingWithdraw.toLocaleString();

            renderTransactions(userWithdrawals);
        }

        function renderTransactions(transactions, filter = 'all') {
            const container = document.getElementById('transactionsList');
            
            let filtered = transactions;
            if (filter !== 'all') {
                filtered = transactions.filter(t => t.type === filter);
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exchange-alt"></i>
                        <p>No transactions found</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(t => `
                <div class="transaction-row">
                    <div class="transaction-icon ${t.type}">
                        <i class="fas fa-${t.type === 'deposit' ? 'arrow-down' : 'arrow-up'}"></i>
                    </div>
                    <div class="transaction-info">
                        <div class="transaction-type">${t.type === 'deposit' ? 'Deposit' : 'Withdrawal'} via ${t.method}</div>
                        <div class="transaction-id">${t.type === 'deposit' ? 'TxnID: ' + t.txnId : 'To: ' + t.toNumber}</div>
                    </div>
                    <div class="transaction-amount ${t.type === 'deposit' ? 'positive' : 'negative'}">
                        ${t.type === 'deposit' ? '+' : '-'}${formatCurrency(t.amount)}
                    </div>
                    <span class="transaction-status ${t.status}">${t.status}</span>
                </div>
            `).join('');
        }

        function filterTransactions(filter) {
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.filter === filter);
            });
            
            const transactions = Storage.get('transactions') || [];
            const user = Storage.get('currentUser');
            const userTransactions = transactions.filter(t => t.userEmail === user.email);
            renderTransactions(userTransactions, filter);
        }

        function logout() {
            Storage.remove('currentUser');
            window.location.href = '../login.html';
        }

        // Desktop dropdown handling
        document.querySelectorAll('.navbar-item').forEach(item => {
            const dropdown = item.querySelector('.navbar-dropdown');
            if (dropdown) {
                item.addEventListener('mouseenter', () => {
                    dropdown.style.display = 'block';
                    setTimeout(() => dropdown.style.opacity = '1', 10);
                });
                item.addEventListener('mouseleave', () => {
                    dropdown.style.opacity = '0';
                    setTimeout(() => dropdown.style.display = 'none', 200);
                });
            }
        });
    </script>
    
    <script src="../js/chat-widget.js"></script>
</body>
</html>
